<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人论文助手</title>
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- 代码高亮库（可选） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand-mark" aria-hidden="true"></div>
                <h2 class="sidebar-title">私人论文助手</h2>
            </div>
            
            <div class="sidebar-content">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span>新建对话</span>
                </button>
                
                <div class="chat-history-section">
                    <div class="history-header">
                        <span>近期对话</span>
                    </div>
                    <div class="chat-history-list" id="chatHistoryList">
                        <!-- 历史对话列表将在这里动态生成 -->
                    </div>
                </div>
                
            </div>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <div class="chat-container">
                <div class="welcome-greeting" id="welcomeGreeting">
                    <p class="welcome-title">你好，我是私人论文助手</p>
                    <p class="welcome-subtitle">支持日常问答、知识库检索与论文调研流程</p>
                </div>
                <div class="chat-messages" id="chatMessages">
                </div>
                
                <div class="chat-input-container">
                    <div class="input-group-wrapper">
                        <div class="input-wrapper">
                            <input type="text" id="messageInput" placeholder="向私人论文助手提问" maxlength="1000" class="message-input">
                            <div class="input-bottom-bar">
                                <div class="tools-btn-wrapper">
                                    <button class="tools-btn" id="toolsBtn" title="更多选项">
                                        <svg class="tools-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                                            <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
                                            <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
                                        </svg>
                                    </button>
                                    <div class="tools-menu" id="toolsMenu">
                                        <div class="tools-menu-item" id="selectDomainItem">
                                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                                <path d="M4 6h16M4 12h16M4 18h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                            </svg>
                                            <span>选择领域</span>
                                        </div>
                                        <div class="tools-menu-item" id="uploadFileItem">
                                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            </svg>
                                            <span>上传文件</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="domain-chip" id="domainChip" title="当前知识库领域（与检索、上传一致）">
                                    <span class="domain-chip-label" id="domainChipLabel">领域：未选择</span>
                                </div>
                                <div class="right-actions">
                                    <div class="stream-mode-label" title="对话统一使用 SSE 流式输出（POST /api/chat_stream）">
                                        <span>流式</span>
                                    </div>
                                    <button class="send-btn-circle" id="sendButton" title="发送">
                                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept=".txt,.md,.markdown" style="display: none;">
                </div>
            </div>
        </main>
    </div>

    <div class="domain-modal" id="domainModal" aria-hidden="true">
        <div class="domain-modal-backdrop" id="domainModalBackdrop"></div>
        <div class="domain-modal-panel" role="dialog" aria-labelledby="domainModalTitle">
            <h3 class="domain-modal-title" id="domainModalTitle">选择知识领域</h3>
            <p class="domain-modal-hint">嵌入与对话检索使用同一领域；请先选择再上传或提问。</p>
            <label class="domain-modal-label" for="domainPresetSelect">预设</label>
            <select id="domainPresetSelect" class="domain-modal-select">
                <option value="">— 选预设 —</option>
                <option value="cybersec">cybersec（安全）</option>
                <option value="nlp">nlp</option>
                <option value="cv">cv</option>
                <option value="systems">systems</option>
            </select>
            <label class="domain-modal-label" for="domainCustomInput">或自定义（字母、数字、下划线、连字符，最多 128 字符）</label>
            <input type="text" id="domainCustomInput" class="domain-modal-input" maxlength="128" placeholder="例如 my_field" autocomplete="off">
            <div class="domain-modal-actions">
                <button type="button" class="domain-modal-btn secondary" id="domainModalCancel">取消</button>
                <button type="button" class="domain-modal-btn primary" id="domainModalConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 加载遮罩层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在处理，请稍候...</div>
            <div class="loading-subtext">后端正在处理，请耐心等待</div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
